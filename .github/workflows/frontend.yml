name: "🚀 Deploy Frontend on push"

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.10.0"

      - name: ✨ Create .env
        run: |
          echo "NEXT_PUBLIC_API_URL=https://krezona-task-backend.onrender.com" >> .env

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build Next.js (static export via next.config.js)
        run: npm run build

      - name: 🔎 Verify static export output
        run: |
          pwd
          ls -la
          ls -la out

      - name: 📂 Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.0.0
        with:
          server: 209.42.27.144
          username: krezona@krezona.rajeshpandey10.com.np
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./out
          exclude: |
            **/.git*
            **/.github*
